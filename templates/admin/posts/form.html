{% extends "admin/base.html" %}

{% if item %}
    {% set page_title = "Edit Item" %}
{% else %}
    {% set page_title = "Create Item" %}
{% endif %}

{% block title %}{{ page_title }} · INCAS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 m-0">{{ page_title }}</h1>
    <a href="{{ url_for('main.admin_posts') }}" class="btn btn-outline-secondary btn-sm">Back</a>
</div>

<form method="post" class="card shadow-sm">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-12">
                <label for="title" class="form-label">Title</label>
                <input
                    type="text"
                    class="form-control"
                    id="title"
                    name="title"
                    maxlength="160"
                    required
                    value="{{ values.title }}"
                >
            </div>

            <div class="col-12">
                <label for="image_url" class="form-label">Image URL</label>
                <input
                    type="url"
                    class="form-control"
                    id="image_url"
                    name="image_url"
                    maxlength="500"
                    value="{{ values.image_url }}"
                >
            </div>

            {% if values.image_url %}
                <div class="col-12">
                    <img src="{{ values.image_url }}" alt="" class="img-fluid rounded border" style="max-height: 260px;">
                </div>
            {% endif %}

            <div class="col-12">
                <label for="body" class="form-label">Body</label>
                <textarea
                    class="form-control"
                    id="body"
                    name="body"
                    rows="8"
                >{{ values.body }}</textarea>
            </div>

            <div class="col-md-6">
                <label for="starts_at" class="form-label">Start Time</label>
                <input
                    type="datetime-local"
                    class="form-control"
                    id="starts_at"
                    name="starts_at"
                    value="{{ values.starts_at }}"
                >
            </div>

            <div class="col-md-6">
                <label for="event_kind" class="form-label">Event Type</label>
                <select class="form-select" id="event_kind" name="event_kind">
                    <option value="" {% if not values.event_kind %}selected{% endif %}>None</option>
                    <option value="karaoke" {% if values.event_kind == "karaoke" %}selected{% endif %}>Karaoke</option>
                    <option value="country_evening" {% if values.event_kind == "country_evening" %}selected{% endif %}>Country Evening</option>
                    <option value="board_games" {% if values.event_kind == "board_games" %}selected{% endif %}>Board Games</option>
                    <option value="cafe_lingua" {% if values.event_kind == "cafe_lingua" %}selected{% endif %}>Café Lingua</option>
                    <option value="dance" {% if values.event_kind == "dance" %}selected{% endif %}>Dance</option>
                    <option value="breakfast" {% if values.event_kind == "breakfast" %}selected{% endif %}>Breakfast</option>
                    <option value="trip" {% if values.event_kind == "trip" %}selected{% endif %}>Trip</option>
                    <option value="housing" {% if values.event_kind == "housing" %}selected{% endif %}>Housing</option>
                </select>
            </div>

            <div class="col-md-6">
                <label for="instagram_media_id" class="form-label">Instagram Media ID</label>
                <input
                    type="text"
                    class="form-control"
                    id="instagram_media_id"
                    name="instagram_media_id"
                    maxlength="64"
                    value="{{ values.instagram_media_id }}"
                >
            </div>

            <div class="col-md-6">
                <label for="instagram_permalink" class="form-label">Instagram Permalink</label>
                <input
                    type="url"
                    class="form-control"
                    id="instagram_permalink"
                    name="instagram_permalink"
                    maxlength="500"
                    value="{{ values.instagram_permalink }}"
                >
            </div>

            <div class="col-md-6 d-flex align-items-end">
                <div class="form-check mb-2">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="is_active"
                        name="is_active"
                        {% if values.is_active %}checked{% endif %}
                    >
                    <label class="form-check-label" for="is_active">
                        Active
                    </label>
                </div>
            </div>

            <div class="col-md-6 d-flex align-items-end">
                <div class="form-check mb-2">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="is_pinned"
                        name="is_pinned"
                        {% if values.is_pinned %}checked{% endif %}
                    >
                    <label class="form-check-label" for="is_pinned">
                        Pinned
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="card-footer d-flex justify-content-end">
        <button type="submit" class="btn btn-dark">Save</button>
    </div>
</form>
{% endblock %}
