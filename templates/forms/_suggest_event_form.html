<form method="post" action="{{ form_action or url_for('main.suggest_event_form') }}" class="card shadow-sm incas-form">
    {% if form_return_to %}
        <input type="hidden" name="return_to" value="{{ form_return_to }}">
    {% endif %}
    <div class="card-body">
        <div class="row g-3">
            {% if form_preset_kind %}
                <input type="hidden" name="kind" value="{{ form_preset_kind }}">
            {% else %}
                <div class="col-md-6">
                    <label class="form-label" for="kind">Event Type <span class="text-danger">*</span></label>
                    <select class="form-select" id="kind" name="kind" required>
                        <option value="">Select</option>
                        <option value="country_evening" {% if values.kind == "country_evening" %}selected{% endif %}>Country Evening</option>
                        <option value="breakfast" {% if values.kind == "breakfast" %}selected{% endif %}>International Breakfast</option>
                    </select>
                </div>
            {% endif %}

            <div class="col-md-6">
                <label class="form-label" for="country">Country <span class="text-danger">*</span></label>
                <input class="form-control" id="country" name="country" autocomplete="country-name" required value="{{ values.country }}">
            </div>

            <div class="col-12">
                <label class="form-label" for="contact_name">Contact Name <span class="text-danger">*</span></label>
                <input class="form-control" id="contact_name" name="contact_name" autocomplete="name" required value="{{ values.contact_name }}">
            </div>

            <div class="col-md-6">
                <label class="form-label" for="contact_email">Email</label>
                <input class="form-control" id="contact_email" name="contact_email" type="email" inputmode="email" autocomplete="email" value="{{ values.contact_email }}">
            </div>

            <div class="col-md-6">
                <label class="form-label" for="contact_phone">Phone</label>
                <input class="form-control" id="contact_phone" name="contact_phone" type="tel" inputmode="tel" autocomplete="tel" value="{{ values.contact_phone }}">
            </div>

            <div class="col-12">
                <div class="form-text">Enter at least email or phone.</div>
            </div>

            <div class="col-12">
                <label class="form-label" for="comment">Comment</label>
                <textarea class="form-control" id="comment" name="comment" rows="5">{{ values.comment }}</textarea>
            </div>
        </div>
    </div>

    <div class="card-footer form-submit-footer d-flex justify-content-end">
        <button type="submit" class="btn btn-dark">Submit</button>
    </div>

    <div class="mobile-sticky-submit">
        <button type="submit" class="btn btn-dark">Submit</button>
    </div>
</form>
