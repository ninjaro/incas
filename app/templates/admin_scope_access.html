{% extends "base.html" %}

{% block title %}{{ scope_label }} Access · INCAS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 m-0">{{ scope_label }}</h1>
            <a href="{{ url_for('main.admin_corridor') }}" class="btn btn-outline-secondary btn-sm">Back</a>
        </div>

        <form method="post" class="card card-body shadow-sm">
            <div class="mb-3">
                <label for="phrase" class="form-label">Access Phrase</label>
                <input type="password" class="form-control" id="phrase" name="phrase" required>
            </div>
            <button type="submit" class="btn btn-dark">Unlock</button>
        </form>
    </div>
</div>
{% endblock %}
