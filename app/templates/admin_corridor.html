{% extends "base.html" %}

{% block title %}Admin Corridor · INCAS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 m-0">Admin Corridor</h1>
    <a href="{{ url_for('main.admin_logout') }}" class="btn btn-outline-secondary btn-sm">Logout</a>
</div>

<div class="row g-3 mb-4">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="text-muted small">Unread Forms</div>
                <div class="fs-3">{{ stats.unread_forms }}</div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="text-muted small">Posts Today</div>
                <div class="fs-3">{{ stats.posts_today }}</div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="text-muted small">Visits Today</div>
                <div class="fs-3">{{ stats.visits_today }}</div>
            </div>
        </div>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <h2 class="h5 mb-3">Doors</h2>
        <div class="list-group">
            <a href="{{ url_for('main.admin_posts') }}" class="list-group-item list-group-item-action">Posts and Events</a>
            <a href="#" class="list-group-item list-group-item-action disabled">Forms</a>
            <a href="#" class="list-group-item list-group-item-action disabled">Integrations</a>
        </div>
    </div>
</div>
{% endblock %}
